<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}HARetroPanel{% endblock %}</title>

    <style>
        body {
            background: #111;
            color: #f0f0f0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0.5rem;
            -webkit-text-size-adjust: 100%;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 1rem;
        }

        .toolbar {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-flex-wrap: wrap;
            flex-wrap: wrap;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            margin-bottom: 1rem;
        }

        .toolbar h1 {
            font-size: 1.8rem;
            margin: 0;
        }

        .toolbar-actions {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-box-align: center;
            -webkit-align-items: center;
            align-items: center;
            margin-left: auto;
        }

        .toolbar-actions .toolbar-link + .toolbar-link {
            margin-left: 0.5rem;
        }

        .toolbar-link {
            color: #4CAF50;
            font-size: 1.1rem;
            text-decoration: none;
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            background: rgba(40, 40, 40, 0.6);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .toolbar-link:active {
            background: rgba(80, 80, 80, 0.6);
        }

        .pagination {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-justify-content: center;
            justify-content: center;
            -webkit-align-items: center;
            align-items: center;
            margin: 1rem 0;
        }

        .pagination > * {
            margin: 0 0.5rem;
        }

        .pager-link {
            color: #4CAF50;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            background: rgba(40,40,40,0.6);
        }

        .pager-disabled {
            color: #555;
        }

        .pager-info {
            color: #ccc;
            font-size: 1rem;
        }

        .grid {
            display: -webkit-box;
            display: -webkit-flex;
            display: flex;
            -webkit-flex-wrap: wrap;
            flex-wrap: wrap;
            margin: -0.5rem;
        }

        .card {
            background: rgba(30, 30, 30, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 1rem;
            -webkit-box-flex: 1;
            -webkit-flex: 1 1 260px;
            flex: 1 1 260px;
            margin: 0.5rem;

            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.1s ease-out;
        }

        .card:active {
            transform: scale(0.97);
        }

        .card-title {
            margin-top: 0;
            font-size: 1.4rem;
            color: #fff;
        }

        .card-meta {
            color: #aaa;
            font-size: 0.9rem;
        }

        .card-value {
            font-size: 1.15rem;
        }

        .btn {
            background: rgba(60, 60, 60, 0.8);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }

        .btn:active {
            background: rgba(90, 90, 90, 0.8);
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        th, td {
            border: 1px solid rgba(255,255,255,0.08);
            padding: 0.4rem;
            text-align: left;
            color: white;
        }

        th {
            background: rgba(30,30,30,0.85);
        }
    </style>
</head>

<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
