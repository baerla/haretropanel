<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}HARetroPanel{% endblock %}</title>

    <style>
        :root {
            color-scheme: dark;
            --bg: #0b0f17;
            --panel: rgba(16, 21, 31, 0.92);
            --panel-border: rgba(255, 255, 255, 0.06);
            --text: #eef3ff;
            --muted: #8d96ab;
            --accent: #64e1ff;
            --accent-strong: #6fffcf;
            --success: #5ebe82;
            --danger: #eb7070;
        }

        body {
            background: radial-gradient(circle at top, rgba(38, 66, 96, 0.35), transparent 55%),
                var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-text-size-adjust: 100%;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 24px 40px;
        }

        .dashboard {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .title {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: #8d96ab;
            font-size: 14px;
            margin-top: 4px;
        }

        .header-actions {
            display: flex;
        }

        .header-actions .header-link + .header-link {
            margin-left: 12px;
        }

        .header-link {
            text-decoration: none;
            color: #e7f1ff;
            background: rgba(30, 40, 60, 0.7);
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 14px;
        }

        .header-link:active {
            background: rgba(40, 60, 90, 0.9);
        }

        .demo-banner {
            background: rgba(250, 200, 70, 0.15);
            color: #f7d48f;
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid rgba(250, 200, 70, 0.35);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            width: fit-content;
        }

        .grid {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }

        .panel {
            background: var(--panel);
            border-radius: 20px;
            border: 1px solid var(--panel-border);
            padding: 20px 22px 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
        }

        .panel-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9bb0d3;
        }

        .panel-meta {
            font-size: 12px;
            color: var(--muted);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .panel-wide {
            grid-column: span 2;
        }

        .solar-hero {
            display: grid;
            grid-template-columns: minmax(220px, 1fr) minmax(280px, 2fr);
            gap: 20px;
            align-items: center;
        }

        .solar-stats {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.9px;
            color: var(--muted);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            margin-top: 6px;
        }

        .stat-bar {
            width: 100%;
            height: 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
            margin-top: 10px;
        }

        .stat-progress {
            height: 100%;
            background: linear-gradient(90deg, rgba(70, 160, 255, 0.4), rgba(110, 255, 204, 0.9));
        }

        .solar-chart {
            position: relative;
            height: 260px;
            background: rgba(15, 20, 30, 0.6);
            border-radius: 18px;
            border: 1px solid rgba(100, 180, 255, 0.15);
            padding: 10px 12px;
        }

        .solar-chart canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .charger-body {
            display: flex;
            flex-direction: column;
            padding: 12px 0 6px;
        }

        .charger-body > * + * {
            margin-top: 8px;
        }

        .charger-reading {
            font-size: 40px;
            font-weight: 600;
        }

        .charger-status {
            font-size: 18px;
            color: #c5d6f3;
        }

        .charger-car-state {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 999px;
            padding: 6px 12px;
            width: fit-content;
        }

        .charger-car-state.is-full {
            color: #02130a;
            background: rgba(110, 255, 204, 0.85);
        }

        .charger-car-state.is-empty {
            color: #d0d6e6;
            background: rgba(80, 90, 120, 0.5);
        }

        .charger-car-state.is-charging {
            color: #02130a;
            background: rgba(94, 190, 130, 0.85);
        }

        .charger-meta {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7f8aa5;
        }

        .garage-grid {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        }

        .garage-card {
            background: rgba(14, 18, 26, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .garage-name {
            font-size: 18px;
            font-weight: 600;
        }

        .garage-state {
            color: #9fb1c9;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .garage-btn {
            border: none;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            color: #f6f9ff;
            background: rgba(60, 80, 120, 0.65);
        }

        .garage-open {
            background: rgba(235, 112, 112, 0.85);
        }

        .garage-closed {
            background: rgba(90, 190, 130, 0.85);
        }

        .garage-btn:active {
            filter: brightness(1.1);
        }

        h1 {
            font-size: 26px;
            margin-bottom: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            background: rgba(14, 18, 26, 0.95);
            border-radius: 12px;
            overflow: hidden;
        }

        th,
        td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            text-align: left;
            font-size: 13px;
        }

        th {
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--muted);
        }

        input[type="number"],
        input[type="checkbox"] {
            accent-color: var(--accent);
        }

        button,
        input[type="submit"] {
            background: rgba(90, 190, 130, 0.85);
            color: #0b0f17;
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            font-weight: 600;
            cursor: pointer;
        }

        button:active,
        input[type="submit"]:active {
            filter: brightness(1.05);
        }

        @media (max-width: 900px) {
            .container {
                padding: 16px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-actions {
                width: 100%;
                justify-content: flex-start;
            }

            .panel-wide {
                grid-column: span 1;
            }

            .solar-hero {
                grid-template-columns: 1fr;
            }

            .page-tabs {
                display: flex;
                gap: 0.75rem;
                margin: 1.25rem 0;
                padding: 0 1rem;
                align-items: center;
            }

            .page-tab {
                padding: 0.6rem 1.5rem;
                background: rgba(255, 255, 255, 0.06);
                border: 2px solid rgba(255, 255, 255, 0.15);
                border-radius: 0.625rem;
                color: rgba(255, 255, 255, 0.45);
                text-decoration: none;
                font-size: 0.9rem;
                font-weight: 600;
                letter-spacing: 0.01em;
                transition: all 0.15s ease;
                cursor: pointer;
            }

            .page-tab:hover {
                background: rgba(255, 255, 255, 0.12);
                border-color: rgba(255, 255, 255, 0.3);
                color: rgba(255, 255, 255, 0.85);
                transform: translateY(-1px);
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            }

            .page-tab-active {
                background: rgba(0, 200, 83, 0.2);
                border-color: #00c853;
                color: #00e65c;
                box-shadow: 0 0 12px rgba(0, 200, 83, 0.15);
                transform: translateY(-1px);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
