name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux-amd64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add x86_64-unknown-linux-gnu

      - name: Cargo build (release, x86_64)
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Create dist directory (Linux x86_64)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_NAME="haretropanel"
          DIST_ROOT="dist"
          DIST_DIR="$DIST_ROOT/${APP_NAME}-v${VERSION}-linux-x86_64"

          mkdir -p "$DIST_DIR"

          cp "target/x86_64-unknown-linux-gnu/release/${APP_NAME}" "$DIST_DIR/"
          cp -r "templates" "$DIST_DIR/templates"
          cp ".env.example" "$DIST_DIR/"

          cd "$DIST_ROOT"
          tar czf "${APP_NAME}-v${VERSION}-linux-x86_64.tar.gz" \
            "${APP_NAME}-v${VERSION}-linux-x86_64"

      - name: Upload Linux x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-package
          path: dist/haretropanel-v*-linux-x86_64.tar.gz

  build-linux-arm64:
    name: Build Linux ARM64 (aarch64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Cross build (release, aarch64-unknown-linux-gnu)
        run: cross build --release --target aarch64-unknown-linux-gnu

      - name: Create dist directory (Linux ARM64)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_NAME="haretropanel"
          DIST_ROOT="dist"
          DIST_DIR="$DIST_ROOT/${APP_NAME}-v${VERSION}-linux-arm64"

          mkdir -p "$DIST_DIR"

          cp "target/aarch64-unknown-linux-gnu/release/${APP_NAME}" "$DIST_DIR/"
          cp -r "templates" "$DIST_DIR/templates"
          cp ".env.example" "$DIST_DIR/"

          cd "$DIST_ROOT"
          tar czf "${APP_NAME}-v${VERSION}-linux-arm64.tar.gz" \
            "${APP_NAME}-v${VERSION}-linux-arm64"

      - name: Upload Linux ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-package
          path: dist/haretropanel-v*-linux-arm64.tar.gz

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo build (release, Windows)
        run: cargo build --release

      - name: Create dist directory and zip (Windows x86_64)
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          $appName = "haretropanel"
          $distRoot = "dist"
          $distDir = Join-Path $distRoot "$appName-v$version-windows-x86_64"

          if (Test-Path $distRoot) {
            Remove-Item $distRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $distDir | Out-Null

          Copy-Item "target\release\$appName.exe" "$distDir\"
          Copy-Item "templates" "$distDir\templates" -Recurse
          Copy-Item ".env.example" "$distDir\"

          $zipPath = Join-Path $distRoot "$appName-v$version-windows-x86_64.zip"
          Compress-Archive -Path $distDir -DestinationPath $zipPath -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-package
          path: dist/haretropanel-v*-windows-x86_64.zip

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-linux-amd64
      - build-linux-arm64
      - build-windows

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List downloaded files (debug)
        run: ls -R dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/**/haretropanel-v*-linux-*.tar.gz
            dist/**/haretropanel-v*-windows-x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
